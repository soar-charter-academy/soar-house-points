# Bidirectional sync between Google Sheet and Supabase
# Runs hourly during school hours (Pacific Time)

name: Sheet Sync

on:
  schedule:
    # Every hour from 7am-5pm PT, Monday-Friday
    # Cron is in UTC, so 7am PT = 14:00 UTC, 5pm PT = 00:00 UTC
    - cron: '0 14-23 * * 1-5'  # 7am-4pm PT
    - cron: '0 0 * * 2-6'      # 5pm PT (next day in UTC)

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests gspread supabase python-dotenv

      - name: Write service account file
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > sync/service-account.json

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env

      - name: Run bidirectional sync
        run: python sync/sheet_sync.py