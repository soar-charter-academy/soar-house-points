on:
  schedule:
    # Once nightly at 4am PT (11:00 UTC), Monday-Friday
    - cron: '0 11 * * 1-5'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests supabase python-dotenv

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
          echo "AERIES_API_CERT=${{ secrets.AERIES_API_CERT }}" >> .env

      - name: Run Aeries sync
        run: python sync/aeries_sync.py