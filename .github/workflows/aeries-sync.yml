on:
  schedule:
    # Nightly at 4am PT (11:00 UTC), Monday-Friday
    - cron: '0 11 * * 1-5'

  workflow_dispatch:

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
          echo "AERIES_API_CERT=${{ secrets.AERIES_API_CERT }}" >> .env

      - name: Install dependencies
        run: python3.12 -m pip install requests supabase python-dotenv --break-system-packages

      - name: Run Aeries sync
        run: python3.12 sync/aeries_sync.py